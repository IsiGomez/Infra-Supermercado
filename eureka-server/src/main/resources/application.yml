server:
  port: 8761


spring:
  application:
    name: eureka-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}


eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

    server:
      eviction-internal-timer-in-ms: 10000

    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/