server:
  port: 8761


spring:
  application:
    name: eureka-server


eureka:
  instance:
    hostname: localhost

  client:
    register-with-eureka: false
    fetch-registry: false

    server:
      eviction-internal-timer-in-ms: 10000

    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
