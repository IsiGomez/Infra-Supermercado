server:
  port: 8083


spring:
  application:
    name: inventario

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true

  kafka:
    consumer:
      group-id: inventario-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"
            value:
              default:
                type: cl.duoc.inventario.event.CompraCompletadaEvent