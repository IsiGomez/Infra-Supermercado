server:
  port: 8086


spring:
  application:
    name: pago

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


eureka:
  instance:
    prefer-ip-address: true